name: Go CI
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Instalar dependências
        run: go mod tidy
      - name: Executar testes
        run: go test ./... -v